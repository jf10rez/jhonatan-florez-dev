# =============================================================================
# portfolio-jf — Virtual Host Nginx (Alternativa B: Docker Networking)
# =============================================================================
# Ubicación: /etc/nginx/sites-available/portfolio.conf
# Enlace: sudo ln -s /etc/nginx/sites-available/portfolio.conf /etc/nginx/sites-enabled/
# =============================================================================
# Asume: Nginx global preinstalado en /etc/nginx/nginx.conf
# Asume: Nginx está en la misma red de Docker que el contenedor
# =============================================================================
# NOTA: Esta alternativa requiere que Nginx (instalado en el host) pueda
# resolver el nombre DNS del contenedor. Esto NO es trivial en una instalación
# estándar de Nginx. Ver explicación en INFRASTRUCTURE.md.
# =============================================================================

# Opción B1: Usando docker-compose DNS (si Nginx corre en otro contenedor)
# upstream portfolio_backend {
#     server portfolio:3000;
#     keepalive 32;
# }

# Opción B2: Usando IP del contenedor (no recomendada, IP cambia)
# upstream portfolio_backend {
#     server 172.20.0.3:3000;
#     keepalive 32;
# }

server {
    listen 80;
    listen [::]:80;
    server_name jhonatan.dev;

    access_log /var/log/nginx/portfolio-access.log;
    error_log /var/log/nginx/portfolio-error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    client_max_body_size 16M;

    # location / {
    #     proxy_pass http://portfolio_backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_connect_timeout 60s;
    #     proxy_send_timeout 60s;
    #     proxy_read_timeout 60s;
    # }
}
