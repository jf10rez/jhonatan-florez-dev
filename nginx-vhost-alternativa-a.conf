# =============================================================================
# portfolio-jf — Virtual Host Nginx (Alternativa A: Puerto Localhost)
# =============================================================================
# Ubicación: /etc/nginx/sites-available/portfolio.conf
# Enlace: sudo ln -s /etc/nginx/sites-available/portfolio.conf /etc/nginx/sites-enabled/
# =============================================================================
# Asume: Nginx global preinstalado en /etc/nginx/nginx.conf
# Asume: Docker expone 127.0.0.1:3001 (solo localhost)
# =============================================================================

upstream portfolio_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name jhonatan.dev;

    # Logs específicos para este virtual host
    access_log /var/log/nginx/portfolio-access.log;
    error_log /var/log/nginx/portfolio-error.log;

    # Gzip para mejor performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Client max body size para formularios de contacto
    client_max_body_size 16M;

    # Proxy a Next.js en localhost:3001
    location / {
        proxy_pass http://portfolio_backend;
        proxy_http_version 1.1;

        # WebSocket support (necesario para Server Actions de Next.js)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers estándar de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Let's Encrypt — descomentar cuando se configure certbot
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }
}

