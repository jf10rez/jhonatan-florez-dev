name: Build, Push & Deploy

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/jhonatan-florez-dev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout del código
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up pnpm
      # -----------------------------------------------------------------------
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      # -----------------------------------------------------------------------
      # 3. Set up Node.js
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -----------------------------------------------------------------------
      # 4. Instalar dependencias (solo en PRs, para lint/typecheck)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        if: github.event_name == 'pull_request'
        run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------------------
      # 5. Lint (solo en PRs)
      # -----------------------------------------------------------------------
      - name: Run linter
        if: github.event_name == 'pull_request'
        run: pnpm run lint

      # -----------------------------------------------------------------------
      # 6. Set up Docker Buildx (multi-platform, cache)
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # 7. Login a Docker Hub
      # -----------------------------------------------------------------------
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 8. Extraer metadata para tags
      # -----------------------------------------------------------------------
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # -----------------------------------------------------------------------
      # 9. Build y push de la imagen
      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # 10. Resumen del build
      # -----------------------------------------------------------------------
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: 'echo "Image pushed: ${{ steps.build.outputs.digest }}"'

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 11. Deploy al VPS
      # -----------------------------------------------------------------------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/jf/apps/jhonatan-florez.dev
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      # -----------------------------------------------------------------------
      # 12. Health Check
      # -----------------------------------------------------------------------
      - name: Health Check
        run: curl -f --max-time 30 https://jhonatan.dev/api/health
